<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ date }} - PDFs</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .back-link { font-size: 0.6em; color: #666; font-weight: normal; }
        ul { list-style-type: none; padding: 0; }
        li { margin: 10px 0; border-bottom: 1px solid #f0f0f0; }
        a { text-decoration: none; color: #0066cc; font-size: 1.1em; display: block; padding: 12px; transition: color 0.2s; }
        a:hover { color: #004499; background-color: #fcfcfc; }
        .icon { margin-right: 8px; }
        .empty { color: #777; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            Files for {{ date }}
            <a href="/" class="back-link">← Back to Index</a>
        </h1>
        {% if files %}
            <ul>
                {% for file in files %}
                <li>
                    <a href="/pdf/{{ date }}/{{ file }}" target="_blank">
                        <span class="icon">📄</span> {{ file }}
                    </a>
                </li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="empty">No PDF files found for this date.</p>
        {% endif %}
    </div>
</body>
</html>
